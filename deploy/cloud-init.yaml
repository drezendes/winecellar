#cloud-config
# Base config for the shared Hetzner box (plan of record: docs/deployment.md —
# Caddy single edge, Docker Compose, tenants never bind public ports). Rendered
# by scripts/deploy/provision.py, which substitutes __SSH_PUBKEY__ with the
# workstation's public key.

package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - git
  - ufw
  - unattended-upgrades
  - rclone # blog `publish` (sftp + B2 images)
  - restic # nightly encrypted backup job

users:
  - name: deploy
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - __SSH_PUBKEY__

write_files:
  - path: /etc/ssh/sshd_config.d/90-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker deploy
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 443/udp
  - ufw --force enable
  # /opt/box = the winecellar checkout + compose project (shipped in the
  # runbook). /srv/blog/<site> = static roots Caddy serves; /srv/backup =
  # nightly restic staging. media/ + logs/ are bind-mounted by the web service.
  - mkdir -p /opt/box/media /opt/box/logs /srv/blog/workshop /srv/backup/buttondown
  - chown -R deploy:deploy /opt/box /srv/blog /srv/backup
  - systemctl restart ssh
